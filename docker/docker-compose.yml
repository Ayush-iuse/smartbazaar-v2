version: '3.8'

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - backend_sqlite:/workspace/data
    environment:
      - DATABASE_URL=sqlite:////workspace/data/db.sqlite3
      - JWT_SECRET=${JWT_SECRET:-supersecretkeychangeinproduction12345!}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    restart: always

  frontend:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: always

volumes:
  backend_sqlite:
